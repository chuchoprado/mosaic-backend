services:
  - type: web
    name: mosaic-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: HOST
        value: "0.0.0.0"
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: RATE_LIMIT_WINDOW
        value: "60000"
      - key: SUPABASE_URL
        value: https://sgxhdyvsowhsehtwspuh.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://mosaic-pearl.vercel.app
